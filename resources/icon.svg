<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Squircle background — paper-tone with a subtle radial wash so the rings
       lift off the surface. The corner radius matches macOS Big Sur+ icons. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="70%" stop-color="#fafaf7"/>
      <stop offset="100%" stop-color="#f2ede3"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#c87a22"/>
      <stop offset="70%" stop-color="#b06b1c"/>
      <stop offset="100%" stop-color="#8a5416"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- Three concentric rings. The center amber disc is the focal point;
       the outer rings are thin inked strokes with the same hand-drawn weight
       as the Excalifont labels inside the app, so the icon and the
       handwritten explanations share a visual family. -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer ring -->
    <circle cx="512" cy="512" r="400" stroke="#1c1c1e" stroke-width="14" stroke-opacity="0.85"/>
    <!-- Middle ring — amber to lift toward the center -->
    <circle cx="512" cy="512" r="280" stroke="#b06b1c" stroke-width="12" stroke-opacity="0.78"/>
  </g>

  <!-- Inner amber disc -->
  <circle cx="512" cy="512" r="165" fill="url(#innerGlow)"/>
  <!-- Ink dot at the exact center — the target -->
  <circle cx="512" cy="512" r="42" fill="#1c1c1e" fill-opacity="0.92"/>
</svg>
