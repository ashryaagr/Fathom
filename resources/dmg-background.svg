<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="460" viewBox="0 0 680 460">
  <!-- Fathom brand palette: paper-warm cream, amber accent, ink dark -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf4e8"/>
      <stop offset="100%" stop-color="#f3ead7"/>
    </linearGradient>

    <!-- Dashed ring to show where icons should end up -->
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <rect width="680" height="460" fill="url(#bg)"/>

  <!-- Title -->
  <text x="340" y="48" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif"
        font-size="22" font-weight="600" fill="#1a1a1a" letter-spacing="-0.3">
    Install Fathom
  </text>

  <!-- Step 1 zone: icon drag -->
  <!-- Fathom.app placeholder — electron-builder overlays the real icon here at (180, 180) -->
  <circle cx="180" cy="180" r="58" fill="none" stroke="#d4b87a" stroke-width="1.5"
          stroke-dasharray="4 4" opacity="0.55"/>

  <!-- Applications placeholder at (500, 180) -->
  <circle cx="500" cy="180" r="58" fill="none" stroke="#d4b87a" stroke-width="1.5"
          stroke-dasharray="4 4" opacity="0.55"/>

  <!-- Arrow between them -->
  <g stroke="#c9832a" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M 250 180 L 425 180"/>
    <path d="M 410 168 L 430 180 L 410 192"/>
  </g>

  <text x="340" y="244" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif"
        font-size="13" font-weight="500" fill="#c9832a">
    Drag Fathom to Applications
  </text>

  <!-- Separator line -->
  <line x1="80" y1="282" x2="600" y2="282" stroke="#e0d3ac" stroke-width="1"/>

  <!-- Step instructions beneath -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif"
     font-size="13" fill="#2a2420" letter-spacing="-0.15">

    <!-- Step 1 -->
    <circle cx="84" cy="316" r="11" fill="#c9832a"/>
    <text x="84" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#faf4e8">1</text>
    <text x="104" y="320" fill="#2a2420">
      Drag <tspan font-weight="600">Fathom.app</tspan> onto the Applications folder above.
    </text>

    <!-- Step 2 -->
    <circle cx="84" cy="352" r="11" fill="#c9832a"/>
    <text x="84" y="356" text-anchor="middle" font-size="12" font-weight="600" fill="#faf4e8">2</text>
    <text x="104" y="356" fill="#2a2420">
      Open <tspan font-weight="600">Applications</tspan>, then double-click <tspan font-weight="600">Fathom</tspan>.
    </text>

    <!-- Step 3 -->
    <circle cx="84" cy="388" r="11" fill="#c9832a"/>
    <text x="84" y="392" text-anchor="middle" font-size="12" font-weight="600" fill="#faf4e8">3</text>
    <text x="104" y="392" fill="#2a2420">
      macOS will ask to approve Fathom. Click <tspan font-weight="600">Done</tspan>, then open
    </text>
    <text x="104" y="408" fill="#2a2420">
      <tspan font-weight="600">System Settings → Privacy &amp; Security → Open Anyway</tspan>.
    </text>

    <!-- Step 4 (reassuring closer) -->
    <text x="340" y="438" text-anchor="middle" font-style="italic" fill="#7a6a52" font-size="12">
      You only do this once. Welcome to Fathom.
    </text>
  </g>
</svg>
