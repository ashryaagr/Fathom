name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: typecheck · build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # fathom-whiteboard is now consumed as a release-tarball dep in
      # package.json (https://github.com/ashryaagr/slate/releases/...).
      # No sibling clone needed — npm ci pulls the tarball directly. We
      # keep --ignore-scripts so postinstall (which builds the vendored
      # excalidraw-mcp) is skipped on CI; runtime needs it, typecheck/
      # build don't.

      # Skip postinstall: better-sqlite3's native build is only required at
      # runtime, not for typechecking or bundling the TypeScript.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck (main + renderer)
        run: npm run typecheck

      - name: Build (electron-vite)
        run: npm run build
